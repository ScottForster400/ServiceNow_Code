 <!-- <pre>{{c.data.updates | json}}</pre> -->
<!-- <p ng-repeat="i in [0,1,1,2,3]">{{i}}</p> -->
<div class="your-favorites-container panel panel-default b panel-wrapper d-flex flex-col" >
    <div class="panel-heading b-b">
        <h3 class="panel-title">What's New</h3>
    </div>
    <div class="d-flex flex-col  panel-body min-h-10 flex-grow align-items-center">

        <!-- Update Card -->
        <a ng-repeat="update in c.data.updates" ng-show="update.isData == true" ng-href="{{update.item_link}}" ng-attr-title="{{update.full_title}}" target="_blank" class="link-normalise w-full">
            <div class="d-flex flex-row border-bottom updates-container justify-start w-full">
                <div class=" d-flex flex-col justify-center align-items-center update-body">

                    <!-- Knowledge Icon                   -->
                    <svg ng-show="update.update_type == 'knowledge_article'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="black" class="bi bi-book" viewBox="0 0 16 16">
                        <path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/>
                    </svg>

                     <!-- Catalogue Icon                   -->
                    <svg ng-show="update.update_type == 'catalog_item'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="black" class="bi bi-archive" viewBox="0 0 16 16">
                        <path d="M0 2a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1v7.5a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 1 12.5V5a1 1 0 0 1-1-1zm2 3v7.5A1.5 1.5 0 0 0 3.5 14h9a1.5 1.5 0 0 0 1.5-1.5V5zm13-3H1v2h14zM5 7.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5"/>
                    </svg>

                    <!-- General Update Icon -->
                    <svg ng-show="update.update_type == 'general_update'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="black" class="bi bi-megaphone" viewBox="0 0 16 16">
                      <path d="M13 2.5a1.5 1.5 0 0 1 3 0v11a1.5 1.5 0 0 1-3 0v-.214c-2.162-1.241-4.49-1.843-6.912-2.083l.405 2.712A1 1 0 0 1 5.51 15.1h-.548a1 1 0 0 1-.916-.599l-1.85-3.49-.202-.003A2.014 2.014 0 0 1 0 9V7a2.02 2.02 0 0 1 1.992-2.013 75 75 0 0 0 2.483-.075c3.043-.154 6.148-.849 8.525-2.199zm1 0v11a.5.5 0 0 0 1 0v-11a.5.5 0 0 0-1 0m-1 1.35c-2.344 1.205-5.209 1.842-8 2.033v4.233q.27.015.537.036c2.568.189 5.093.744 7.463 1.993zm-9 6.215v-4.13a95 95 0 0 1-1.992.052A1.02 1.02 0 0 0 1 7v2c0 .55.448 1.002 1.006 1.009A61 61 0 0 1 4 10.065m-.657.975 1.609 3.037.01.024h.548l-.002-.014-.443-2.966a68 68 0 0 0-1.722-.082z"/>
                    </svg>

                </div>
                <div class="d-flex flex-grow flex-col justify-center update-body">
                    <div class="d-flex flex-row flex-grow justify-between align-items-center mg-b-xs">
                        <p ng-href="update.item_link" class="mg-none col-link font-s-base underline">{{update.name}}</p>
                        
                        <!-- Updated pill -->
                        <div ng-show="update.new_or_updated == 'Updated'" class="state-pill-updated d-flex justify-center align-items-center">
                            <p class="mg-none">{{update.new_or_updated}}</p>
                        </div>

                        <!-- new Pill -->
                        <div ng-show="update.new_or_updated == 'New'" class="state-pill-new d-flex justify-center align-items-center">
                            <p class="mg-none">{{update.new_or_updated}}</p>
                        </div>

                    </div>
                    <p class ="mg-b-xs col-grey-light font-s-small font-w-base">{{update.description}}</p>
                </div>
            </div>
        </a>

        <!-- No Data Display -->
        <div ng-repeat="update in c.data.updates" ng-show="update.isData == false" class="d-flex flex-col justify-center align-items-center flex-grow min-h-10">
                <div class="d-flex flex-col justify-center align-items-center col-no-data mg-b-1-2">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-megaphone" viewBox="0 0 16 16">
                      <path d="M13 2.5a1.5 1.5 0 0 1 3 0v11a1.5 1.5 0 0 1-3 0v-.214c-2.162-1.241-4.49-1.843-6.912-2.083l.405 2.712A1 1 0 0 1 5.51 15.1h-.548a1 1 0 0 1-.916-.599l-1.85-3.49-.202-.003A2.014 2.014 0 0 1 0 9V7a2.02 2.02 0 0 1 1.992-2.013 75 75 0 0 0 2.483-.075c3.043-.154 6.148-.849 8.525-2.199zm1 0v11a.5.5 0 0 0 1 0v-11a.5.5 0 0 0-1 0m-1 1.35c-2.344 1.205-5.209 1.842-8 2.033v4.233q.27.015.537.036c2.568.189 5.093.744 7.463 1.993zm-9 6.215v-4.13a95 95 0 0 1-1.992.052A1.02 1.02 0 0 0 1 7v2c0 .55.448 1.002 1.006 1.009A61 61 0 0 1 4 10.065m-.657.975 1.609 3.037.01.024h.548l-.002-.014-.443-2.966a68 68 0 0 0-1.722-.082z"/>
                    </svg>
                </div>
                <p class ="mg-b-xs col-no-data font-w-base align-center">There are currently no new announcements</p>
        </div>
    </div>
</div>
